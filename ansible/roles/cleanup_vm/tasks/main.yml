---
- name: Remove older versions kernel and other packages
  ansible.builtin.command: dnf -y remove --oldinstallonly
  register: removeoldoutput
  changed_when: removeoldoutput.rc == 0
  ignore_errors: yes
  when: ansible_facts.pkg_mgr == 'dnf'

- name: Remove older versions kernel and other packages (apt)
  ansible.builtin.command: apt-get autoremove --purge -y
  register: removeoldoutput_apt
  changed_when: removeoldoutput_apt.rc == 0
  ignore_errors: yes
  when: ansible_facts.pkg_mgr == 'apt'

- name: Remove Ubuntu generic kernel and firmware packages
  ansible.builtin.shell: |
    apt-get purge -y 'linux-generic*' 'linux-headers-generic*' 'linux-image-generic*' 'linux-modules-extra-*' linux-firmware || true
  when: ansible_facts.distribution == 'Ubuntu'

- name: Autopurge removed APT packages
  ansible.builtin.command: apt-get autopurge -y
  register: autopurgeoutput_apt
  changed_when: autopurgeoutput_apt.rc == 0
  ignore_errors: yes
  when: ansible_facts.pkg_mgr == 'apt'

- name: Remove old kernel images (apt)
  shell: |
    dpkg -l 'linux-image-*' | awk '/^ii/{print $2}' | grep -v $(uname -r) | xargs -r apt-get -y purge
  when: ansible_facts.pkg_mgr == 'apt'
  ignore_errors: yes

- name: Remove snapd from Ubuntu images
  ansible.builtin.apt:
    name: snapd
    state: absent
    purge: true
    autoremove: true
  when: ansible_facts.distribution == 'Ubuntu'

- name: Remove Ubuntu snap leftovers
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /snap
    - /var/snap
    - /var/lib/snapd
    - /var/cache/snapd
    - /root/snap
  when: ansible_facts.distribution == 'Ubuntu'

- name: Include sbom_data role for SBOM data collection
  include_role:
    name: sbom_data
  when: collect_sbom_data | bool

- name: Find persistent net rules
  ansible.builtin.find:
    paths: /etc/udev/rules.d
    patterns: "70*"
  register: persistnet_rules

- name: Delete found persistent net rules
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ persistnet_rules.files }}"
  loop_control:
    label: "{{ item.path }}"

- name: Find NetworkManager system connection files
  ansible.builtin.find:
    paths: /etc/NetworkManager/system-connections
    patterns: "*.nmconnection"
  register: networkmanager_system_connection_files

- name: Delete found NetworkManager system connection files
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ networkmanager_system_connection_files.files }}"
  loop_control:
    label: "{{ item.path }}"

- name: Delete DNF cache
  command: dnf clean all
  when: ansible_facts.pkg_mgr == 'dnf'

- name: Delete APT cache
  command: apt-get clean
  when: ansible_facts.pkg_mgr == 'apt'

- name: Remove APT lists
  command: rm -rf /var/lib/apt/lists/*
  when: ansible_facts.pkg_mgr == 'apt'

- name: Find DNF history files
  ansible.builtin.find:
    paths: /var/lib/dnf
    patterns: "history*"
  register: dnf_history
  when: ansible_facts.pkg_mgr == 'dnf'

- name: Reset DNF history
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ dnf_history.files }}"
  loop_control:
    label: "{{ item.path }}"
  when: ansible_facts.pkg_mgr == 'dnf'

- name: Find temporary files
  find:
    file_type: any
    paths:
      - /tmp
      - /var/tmp
    patterns: '*'
  register: tmp_files

- name: Remove temporary files
  file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ tmp_files.files }}"
  loop_control:
    label: "{{ item.path }}"

- name: Remove SSH host keys
  block:
    - name: Find SSH host keys
      find:
        paths: /etc/ssh
        patterns: '*host*key*'
      register: host_keys

    - name: Remove SSH host keys
      file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ host_keys.files }}"
      loop_control:
        label: "{{ item.path }}"
  when: cleanup_ssh_host_keys | bool

- name: Remove kickstart files
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /root/anaconda-ks.cfg
    - /root/original-ks.cfg
  when: ansible_facts.pkg_mgr == 'dnf'

- name: Truncate RHEL log files
  command: "truncate -s 0 {{ item }}"
  loop:
    - /etc/machine-id
    - /etc/resolv.conf
    - /var/log/audit/audit.log
    - /var/log/wtmp
    - /var/log/lastlog
    - /var/log/btmp
    - /var/log/cron
    - /var/log/maillog
    - /var/log/messages
    - /var/log/secure
    - /var/log/spooler
  when: ansible_facts.pkg_mgr == 'dnf'

- name: Truncate Debian log files
  command: "truncate -s 0 {{ item }}"
  loop:
    - /etc/machine-id
    - /etc/resolv.conf
    - /var/log/wtmp
    - /var/log/lastlog
    - /var/log/btmp
    - /var/log/auth.log
    - /var/log/syslog
    - /var/log/kern.log
    - /var/log/daemon.log
  when: ansible_facts.pkg_mgr == 'apt'

- name: Vacuum systemd journal
  command: journalctl --vacuum-size=0
  when: ansible_facts.pkg_mgr == 'apt'
  ignore_errors: yes

- name: Remove documentation
  shell: rm -rf /usr/share/doc/* /usr/share/man/* /usr/share/info/*
  when: ansible_facts.pkg_mgr == 'apt'

- name: Find unused locale directories
  ansible.builtin.find:
    paths: /usr/share/locale
    file_type: directory
    excludes: "en*,locale.alias"
  register: unused_locales
  when: ansible_facts.pkg_mgr == 'apt'

- name: Remove unused locale directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ unused_locales.files }}"
  loop_control:
    label: "{{ item.path }}"
  when: ansible_facts.pkg_mgr == 'apt'

- name: Find Ubuntu build-time netplan configuration files
  ansible.builtin.find:
    paths: /etc/netplan
    patterns: "*.yaml"
  register: ubuntu_netplan_files
  when: ansible_facts.distribution == 'Ubuntu'

- name: Remove Ubuntu build-time netplan configuration files
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ ubuntu_netplan_files.files }}"
  loop_control:
    label: "{{ item.path }}"
  when: ansible_facts.distribution == 'Ubuntu'

- name: Remove RHEL log folders
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /var/log/anaconda
    - /var/log/qemu-ga
    - /var/log/tuned
    - /var/lib/cloud
    - /etc/hostname
    - /etc/machine-info
    - /var/lib/systemd/credential.secret
  when: ansible_facts.pkg_mgr == 'dnf'

- name: Remove Debian log folders
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /var/log/qemu-ga
    - /var/log/tuned
    - /var/lib/cloud
    - /etc/hostname
    - /etc/machine-info
    - /var/lib/systemd/credential.secret
  when: ansible_facts.pkg_mgr == 'apt'

- name: Find log files.
  find:
    paths:
      - /var/log
      - /var/log/sssd
    patterns: '*log,*.old,*.log.gz,*.[0-9],*.gz,*-????????'
  register: log_files

- name: Remove log files
  file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ log_files.files }}"
  loop_control:
    label: "{{ item.path }}"

- name: Remove random-seed
  file:
    path: /var/lib/systemd/random-seed
    state: absent

- name: Disable root SSH login via password
  when: ansible_facts.pkg_mgr == 'dnf' and ansible_facts['distribution_major_version'] | int >= 9
  file:
    path: /etc/ssh/sshd_config.d/01-permitrootlogin.conf
    state: absent

- name: Remove Packer SSH override
  file:
    path: /etc/ssh/sshd_config.d/01-packer.conf
    state: absent

- name: Remove installer user
  ansible.builtin.user:
    name: "{{ item.name }}"
    state: absent
    remove: true
    force: true
  loop:
    - distribution: Debian
      name: debian
    - distribution: Ubuntu
      name: ubuntu
  loop_control:
    label: "{{ item.name }}"
  when: ansible_facts.distribution == item.distribution

- name: Fill free space with zeroes
  shell: dd if=/dev/zero of=/zeroed_file bs=1M oflag=direct || rm -f /zeroed_file

- name: Detect swap partition
  command: grep -oP '^/dev/[\w-]+' /proc/swaps
  register: swaps
  ignore_errors: true

- name: Wipe out swap data
  block:
    - name: Get swap partition UUID
      command: "blkid {{ swaps.stdout }} -s UUID -o value"
      register: swap_blkid

    - name: Unmount swap partition
      command: "swapoff {{ swaps.stdout }}"

    - name: Fill swap partition with zeroes
      shell: "dd if=/dev/zero of={{ swaps.stdout }} bs=1M oflag=direct || /bin/true"

    - name: Format swap partition
      command: "mkswap -U {{ swap_blkid.stdout }} -f {{ swaps.stdout }}"

    - name: Mount swap partition
      command: "swapon {{ swaps.stdout }}"
  when: swaps.rc == 0 and not swaps.stdout is search('/dev/zram')

- name: Sync disc
  command: sync

- name: Clear shell history
  shell: bash -c "history -c"
  args:
    executable: /bin/bash

- name: Check if WALinuxAgent is installed
  stat:
    path: /usr/sbin/waagent
  register: cleanup_vm_waagent

- name: Deprovision WALinuxAgent
  command: waagent -deprovision+user -force
  when: cleanup_vm_waagent.stat is defined and cleanup_vm_waagent.stat.exists
