- name: Install cloud-init (dnf)
  dnf:
    name:
      - cloud-init
      - cloud-utils-growpart
      - dracut-config-generic
  when: ansible_facts.pkg_mgr == 'dnf'

- name: Install cloud-init (apt)
  apt:
    name:
      - cloud-init
      - cloud-guest-utils
      - netplan.io
      - systemd-resolved
    state: present
    install_recommends: false
  when: ansible_facts.pkg_mgr == 'apt'

- name: Enable cloud-init services
  service:
    name: "{{ item }}"
    enabled: true
  with_items:
    - cloud-config
    - cloud-init
    - cloud-init-local
    - cloud-final
  failed_when: false

- name: Enable APT network runtime services
  ansible.builtin.service:
    name: "{{ item }}"
    enabled: true
  loop:
    - systemd-networkd
    - systemd-resolved
  failed_when: false
  when: ansible_facts.pkg_mgr == 'apt'

- name: Configure cloud-init user name
  replace:
    dest: /etc/cloud/cloud.cfg
    regexp: '^(\s+name:).*$'
    replace: "\\1 {{ cloud_init_user }}"
  when: cloud_init_user | length > 0

- name: Enable cloud-init network configuration in main config
  ansible.builtin.replace:
    path: /etc/cloud/cloud.cfg
    regexp: '(?ms)^network:\n\s+config:\s+disabled\n?'
    replace: ''
  when: ansible_facts.distribution == 'Ubuntu'

- name: Find Ubuntu cloud-init config snippets
  ansible.builtin.find:
    paths: /etc/cloud/cloud.cfg.d
    file_type: any
    hidden: true
  register: ubuntu_cloud_cfg_snippets
  when: ansible_facts.distribution == 'Ubuntu'

- name: Remove Ubuntu cloud-init config snippets
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ ubuntu_cloud_cfg_snippets.files }}"
  loop_control:
    label: "{{ item.path }}"
  when: ansible_facts.distribution == 'Ubuntu'

- name: Configure APT cloud-init datasource and networking
  ansible.builtin.copy:
    dest: /etc/cloud/cloud.cfg.d/90-pve-cloud-init.cfg
    owner: root
    group: root
    mode: "0644"
    content: |
      datasource_list: [ ConfigDrive, NoCloud, None ]
      disable_fallback_netcfg: true
  when: ansible_facts.pkg_mgr == 'apt'

- name: Configure Ubuntu cloud-init netplan renderer
  ansible.builtin.copy:
    dest: /etc/cloud/cloud.cfg.d/91-ubuntu-netplan.cfg
    owner: root
    group: root
    mode: "0644"
    content: |
      system_info:
        network:
          renderers: ['netplan']
          activators: ['netplan', 'networkd']
  when: ansible_facts.distribution == 'Ubuntu'

- name: Configure Debian cloud-init netplan renderer
  ansible.builtin.copy:
    dest: /etc/cloud/cloud.cfg.d/91-debian-netplan.cfg
    owner: root
    group: root
    mode: "0644"
    content: |
      system_info:
        network:
          renderers: ['netplan', 'eni']
          activators: ['netplan', 'networkd', 'eni']
  when: ansible_facts.distribution == 'Debian'
