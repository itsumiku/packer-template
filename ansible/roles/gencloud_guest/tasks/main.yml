---
- name: Set default kernel package type to kernel
  ansible.builtin.replace:
    path: /etc/sysconfig/kernel
    regexp: "^(DEFAULTKERNEL=).*$"
    replace: "\\1kernel"
  when: ansible_facts.pkg_mgr == 'dnf'

# https://bugzilla.redhat.com/show_bug.cgi?id=1849082#c7
- name: Enabled Xen Project PVHVM drivers only on x86_64
  when: ansible_facts['architecture'] == 'x86_64' and ansible_facts.pkg_mgr == 'dnf'
  block:
    - name: Create a configuration for dracut
      ansible.builtin.lineinfile:
        path: /etc/dracut.conf.d/xen_pvhvm.conf
        line: 'add_drivers+=" xen-netfront xen-blkfront "'
        create: true
        owner: root
        group: root
        mode: "0644"

    - name: Regenerate all initramfs images
      ansible.builtin.command:
        cmd: dracut -f --regenerate-all
      changed_when: true

# Optimizations
- name: Install additional packages (dnf)
  ansible.builtin.dnf:
    install_weak_deps: "{{ false if ansible_facts['distribution_major_version'] | int >= 9 else omit }}"
    name:
      - qemu-guest-agent
      - nfs-utils
      - rsync
      - jq
      - tcpdump
      - tuned
    state: present
  when: ansible_facts.pkg_mgr == 'dnf'

- name: Install additional packages (apt)
  ansible.builtin.apt:
    name:
      - qemu-guest-agent
    state: present
    install_recommends: false
  when: ansible_facts.pkg_mgr == 'apt'

- name: Enable TuneD service
  ansible.builtin.systemd_service:
    name: tuned.service
    enabled: true
    state: started
  when: ansible_facts.pkg_mgr == 'dnf'

- name: Get current TuneD profile
  ansible.builtin.command:
    cmd: tuned-adm active
  register: tuned_adm_active
  changed_when: false
  when: ansible_facts.pkg_mgr == 'dnf'

- name: Test if TuneD profile is active
  ansible.builtin.assert:
    that: "tuned_adm_active.stdout is search('virtual-guest')"
    fail_msg: Configured active profile is not same as current one
    success_msg: The configured TuneD profile is current
  when: ansible_facts.pkg_mgr == 'dnf'

- name: Configure cloud console kernel arguments (Debian)
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
    line: 'GRUB_CMDLINE_LINUX_DEFAULT="nomodeset console=tty0 console=ttyS0,115200n8"'
  when: ansible_facts.distribution == 'Debian'

- name: Configure cloud console and interface kernel arguments (Ubuntu)
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
    line: 'GRUB_CMDLINE_LINUX_DEFAULT="nomodeset console=tty0 console=ttyS0,115200n8 net.ifnames=0 biosdevname=0"'
  when: ansible_facts.distribution == 'Ubuntu'

- name: Ensure Ubuntu GRUB drop-in directory exists
  ansible.builtin.file:
    path: /etc/default/grub.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: ansible_facts.distribution == 'Ubuntu'

- name: Configure Ubuntu cloud kernel arguments drop-in
  ansible.builtin.copy:
    dest: /etc/default/grub.d/99-gencloud.cfg
    owner: root
    group: root
    mode: "0644"
    content: |
      GRUB_CMDLINE_LINUX_DEFAULT="nomodeset console=tty0 console=ttyS0,115200n8 net.ifnames=0 biosdevname=0"
  when: ansible_facts.distribution == 'Ubuntu'

- name: Ensure Ubuntu systemd network directory exists
  ansible.builtin.file:
    path: /etc/systemd/network
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: ansible_facts.distribution == 'Ubuntu'

- name: Keep Ubuntu virtio network interfaces on kernel names
  ansible.builtin.copy:
    dest: /etc/systemd/network/10-gencloud-virtio-net.link
    owner: root
    group: root
    mode: "0644"
    content: |
      [Match]
      Driver=virtio_net

      [Link]
      NamePolicy=kernel
  when: ansible_facts.distribution == 'Ubuntu'

- name: Mask Ubuntu networkd wait-online service
  ansible.builtin.systemd_service:
    name: systemd-networkd-wait-online.service
    enabled: false
    masked: true
  failed_when: false
  when: ansible_facts.distribution == 'Ubuntu'

- name: Ensure Ubuntu SSH service drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/ssh.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: ansible_facts.distribution == 'Ubuntu'

- name: Generate Ubuntu SSH host keys before ssh starts
  ansible.builtin.copy:
    dest: /etc/systemd/system/ssh.service.d/10-gencloud-host-keys.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Service]
      ExecStartPre=
      ExecStartPre=/usr/bin/ssh-keygen -A
      ExecStartPre=/usr/sbin/sshd -t
  when: ansible_facts.distribution == 'Ubuntu'

- name: Regenerate GRUB configuration (apt)
  ansible.builtin.command:
    cmd: update-grub
  changed_when: true
  when: ansible_facts.pkg_mgr == 'apt'


- name: Regenerate all initramfs images (dracut)
  when: ansible_facts['architecture'] != 'x86_64' and ansible_facts.pkg_mgr == 'dnf'
  ansible.builtin.command:
    cmd: dracut -f --regenerate-all
  changed_when: true

- name: Regenerate all initramfs images (update-initramfs)
  ansible.builtin.command:
    cmd: update-initramfs -u
  changed_when: true
  when: ansible_facts.pkg_mgr == 'apt'

- name: Disable root login
  ansible.builtin.user:
    name: root
    password: "*"
